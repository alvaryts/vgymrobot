name: 🌐 VGymRobot - Remote Worker

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "ID de la solicitud externa"
        required: true
        type: string
  repository_dispatch:
    types:
      - booking-request-created

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  REQUEST_ID: ${{ github.event.inputs.request_id || github.event.client_payload.request_id }}

concurrency:
  group: remote-worker-${{ github.event.inputs.request_id || github.event.client_payload.request_id }}
  cancel-in-progress: false

jobs:
  remote-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v5

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: 📦 Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 🤖 Ejecutar worker remoto
        env:
          WORKER_API_BASE_URL: ${{ secrets.WORKER_API_BASE_URL }}
          WORKER_SHARED_SECRET: ${{ secrets.WORKER_SHARED_SECRET }}
        run: python src/remote_worker.py --request-id "${{ env.REQUEST_ID }}"
